<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Our Household Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Fraunces', serif; }
  .font-mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  input[type=number], input[type=text] { font-family: inherit; }
  input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: #E4DFD3; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #2F5D62; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useCallback } = React;

const C = {
  paper: "#FAF8F3", card: "#FFFFFF", ink: "#262421", inkSoft: "#6B6659",
  line: "#E4DFD3", ledger: "#2F5D62", ledgerDark: "#20403F",
  moss: "#4B7A51", mossBg: "#EAF1E8", rust: "#B54B2E", rustBg: "#F7E9E4",
  sand: "#F0EBDD", gold: "#B08D3F",
};

const fmt = (n) => (isNaN(n) ? 0 : n).toLocaleString("en-US", { style: "currency", currency: "USD" });
const monthKey = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const monthLabel = (d) => d.toLocaleString("en-US", { month: "long", year: "numeric" });

const DEFAULT_SETTINGS = {
  incomeA: 1840, incomeB: 1277, rent: 1750,
  fixedBills: [
    { id: "bmw", name: "BMW Car Payment", amount: 1107.66 },
    { id: "geico", name: "Geico Insurance", amount: 113 },
    { id: "tmobile", name: "T-Mobile", amount: 141 },
    { id: "jewelry", name: "Jewelry Payment", amount: 505 },
    { id: "sofa", name: "Crate & Barrel Card (Sofa)", amount: 35 },
    { id: "watch", name: "Apple Watch (9/12)", amount: 66.58 },
    { id: "iphone", name: "iPhone (21/24)", amount: 29.12 },
    { id: "icloud", name: "iCloud Storage", amount: 9.99 },
    { id: "claude", name: "Claude", amount: 20 },
  ],
  variableBills: [
    { id: "utilities", name: "Electric / Water / Gas", budgeted: 125 },
    { id: "groceries", name: "Groceries", budgeted: 500 },
    { id: "gas", name: "Car Fuel", budgeted: 150 },
    { id: "cats", name: "Cat Food / Litter / Vet", budgeted: 100 },
  ],
  availableFunds: 0,
  debts: [
    { id: "jewelry", name: "Jewelry Payment", balance: 12266.68, apr: 0, minPayment: 505, extra: 0 },
    { id: "sofa", name: "Crate & Barrel Card (Sofa)", balance: 3458.04, apr: 0, minPayment: 35, extra: 0 },
    { id: "cc1", name: "Credit Card 1", balance: 10209.59, apr: 0, minPayment: 0, extra: 0 },
    { id: "cc2", name: "Credit Card 2", balance: 3473.71, apr: 0, minPayment: 0, extra: 0 },
  ],
};

// ---- localStorage persistence (works on any real website) ----
const loadJSON = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
};
const saveJSON = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};

function HouseholdLedger() {
  const [settings, setSettings] = useState(() => loadJSON("ledger:settings", DEFAULT_SETTINGS));
  const [viewDate, setViewDate] = useState(new Date());
  const [monthData, setMonthData] = useState({ paid: {}, actuals: {} });
  const [addingFixed, setAddingFixed] = useState(false);
  const [addingVar, setAddingVar] = useState(false);
  const [newBillName, setNewBillName] = useState("");
  const [newBillAmt, setNewBillAmt] = useState("");
  const [addingDebt, setAddingDebt] = useState(false);
  const [newDebtName, setNewDebtName] = useState("");
  const [newDebtBalance, setNewDebtBalance] = useState("");

  const mk = monthKey(viewDate);

  useEffect(() => {
    setMonthData(loadJSON(`ledger:month:${mk}`, { paid: {}, actuals: {} }));
  }, [mk]);

  const saveSettings = useCallback((next) => {
    setSettings(next);
    saveJSON("ledger:settings", next);
  }, []);

  const saveMonth = useCallback((next) => {
    setMonthData(next);
    saveJSON(`ledger:month:${mk}`, next);
  }, [mk]);

  const togglePaid = (id) => saveMonth({ ...monthData, paid: { ...monthData.paid, [id]: !monthData.paid[id] } });
  const setActual = (id, val) => saveMonth({ ...monthData, actuals: { ...monthData.actuals, [id]: val } });
  const removeFixed = (id) => saveSettings({ ...settings, fixedBills: settings.fixedBills.filter(b => b.id !== id) });
  const removeVar = (id) => saveSettings({ ...settings, variableBills: settings.variableBills.filter(b => b.id !== id) });

  const addFixed = () => {
    if (!newBillName.trim() || !newBillAmt) return;
    const id = `fx_${Date.now()}`;
    saveSettings({ ...settings, fixedBills: [...settings.fixedBills, { id, name: newBillName.trim(), amount: parseFloat(newBillAmt) }] });
    setNewBillName(""); setNewBillAmt(""); setAddingFixed(false);
  };
  const addVar = () => {
    if (!newBillName.trim() || !newBillAmt) return;
    const id = `vr_${Date.now()}`;
    saveSettings({ ...settings, variableBills: [...settings.variableBills, { id, name: newBillName.trim(), budgeted: parseFloat(newBillAmt) }] });
    setNewBillName(""); setNewBillAmt(""); setAddingVar(false);
  };

  const removeDebt = (id) => saveSettings({ ...settings, debts: settings.debts.filter(d => d.id !== id) });
  const addDebt = (name, balance) => {
    if (!name.trim() || !balance) return;
    const id = `dt_${Date.now()}`;
    saveSettings({ ...settings, debts: [...settings.debts, { id, name: name.trim(), balance: parseFloat(balance), apr: 0, minPayment: 0, extra: 0 }] });
  };

  const monthlyIncome = ((parseFloat(settings.incomeA) || 0) + (parseFloat(settings.incomeB) || 0)) * 26 / 12;
  const rent = parseFloat(settings.rent) || 0;
  const fixedTotal = settings.fixedBills.reduce((s, b) => s + (parseFloat(b.amount) || 0), 0) + rent;
  const variableActualTotal = settings.variableBills.reduce((s, b) => {
    const a = monthData.actuals[b.id];
    return s + (a !== undefined && a !== "" ? parseFloat(a) : parseFloat(b.budgeted) || 0);
  }, 0);
  const remaining = monthlyIncome - fixedTotal - variableActualTotal;
  const paidCount = settings.fixedBills.filter(b => monthData.paid[b.id]).length;

  const availableFunds = parseFloat(settings.availableFunds) || 0;
  const totalDebt = (settings.debts || []).reduce((s, d) => s + (parseFloat(d.balance) || 0), 0);
  const netPosition = availableFunds - totalDebt;

  const computePayoff = (bal, monthlyRate, payment) => {
    if (bal <= 0 || payment <= 0) return { months: 0, totalInterest: 0 };
    let b = bal, months = 0, interest = 0;
    while (b > 0 && months < 600) {
      const int = b * monthlyRate;
      interest += int; b = b + int - payment; months++;
    }
    return { months, totalInterest: interest };
  };

  const getDebtCalc = (debt) => {
    const balance = parseFloat(debt.balance) || 0;
    const apr = parseFloat(debt.apr) || 0;
    const extra = parseFloat(debt.extra) || 0;
    const minPayment = parseFloat(debt.minPayment) || 0;
    const basePayment = minPayment + extra;
    const monthlyRate = apr / 100 / 12;
    const withExtra = computePayoff(balance, monthlyRate, basePayment);
    const withoutExtra = computePayoff(balance, monthlyRate, minPayment);
    return { balance, apr, extra, minPayment, basePayment, withExtra, withoutExtra, monthsSaved: withoutExtra.months - withExtra.months };
  };

  const updateDebt = (debtId, field, val) => {
    saveSettings({ ...settings, debts: settings.debts.map(d => d.id === debtId ? { ...d, [field]: val } : d) });
  };

  return (
    <div style={{ background: C.paper, minHeight: "100vh", color: C.ink }}>
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 20px" }}>
        <h1 className="font-display" style={{ fontSize: 30, color: C.ledgerDark, margin: "0 0 4px" }}>Our Household Budget</h1>
        <p style={{ fontSize: 13, color: C.inkSoft, margin: "0 0 24px" }}>Bills, budgets, and the payoff plan — updated together.</p>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.ledgerDark, borderRadius: 8, padding: "12px 16px", marginBottom: 24 }}>
          <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1))} style={{ background: "none", border: "none", color: "#fff", fontSize: 18, cursor: "pointer" }}>‹</button>
          <span className="font-mono" style={{ color: "#fff", fontSize: 14 }}>{monthLabel(viewDate)}</span>
          <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1))} style={{ background: "none", border: "none", color: "#fff", fontSize: 18, cursor: "pointer" }}>›</button>
        </div>

        <div style={{ background: C.ledgerDark, borderRadius: 8, padding: 16, marginBottom: 24 }}>
          <p style={{ fontSize: 12, color: "#C9D6D5", margin: "0 0 4px" }}>Available funds (joint checking account)</p>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="font-mono" style={{ fontSize: 18, color: "#fff" }}>$</span>
            <input type="number" value={settings.availableFunds} onChange={(e) => saveSettings({ ...settings, availableFunds: e.target.value })}
              className="font-mono" style={{ fontSize: 18, background: "transparent", border: "none", outline: "none", color: "#fff", width: "100%" }} placeholder="0.00" />
          </div>
          <p style={{ fontSize: 12, margin: "8px 0 0", color: totalDebt > 0 ? "#E8C4B8" : "#C9D6D5" }}>
            Total debt owed: {fmt(totalDebt)} · Net position: {fmt(netPosition)}
          </p>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 32 }}>
          <Stat label="Monthly income" value={fmt(monthlyIncome)} />
          <Stat label="Fixed bills (incl. rent)" value={fmt(fixedTotal)} />
          <Stat label="Variable (actual)" value={fmt(variableActualTotal)} />
          <Stat label="Left over" value={fmt(remaining)} accent={remaining < 0 ? C.rust : C.moss} bg={remaining < 0 ? C.rustBg : C.mossBg} />
        </div>

        <Section title="Fixed Bills" subtitle={`${paidCount} of ${settings.fixedBills.length + 1} paid this month`}>
          <BillRow name={`Rent + Utilities (base ${fmt(rent)})`} amount={rent} paid={monthData.paid["rent"]} onToggle={() => togglePaid("rent")} />
          {settings.fixedBills.map(b => (
            <BillRow key={b.id} name={b.name} amount={b.amount} paid={monthData.paid[b.id]} onToggle={() => togglePaid(b.id)} onRemove={() => removeFixed(b.id)} />
          ))}
          <AddRow adding={addingFixed} setAdding={setAddingFixed} name={newBillName} setName={setNewBillName} amt={newBillAmt} setAmt={setNewBillAmt} onAdd={addFixed} label="Add fixed bill" />
        </Section>

        <Section title="Variable Bills" subtitle="Budgeted estimate vs. this month's actual">
          {settings.variableBills.map(b => (
            <VarRow key={b.id} bill={b} actual={monthData.actuals[b.id]} onChangeActual={(v) => setActual(b.id, v)} onRemove={() => removeVar(b.id)} />
          ))}
          <AddRow adding={addingVar} setAdding={setAddingVar} name={newBillName} setName={setNewBillName} amt={newBillAmt} setAmt={setNewBillAmt} onAdd={addVar} label="Add variable bill" />
        </Section>

        <h2 className="font-display" style={{ fontSize: 20, color: C.ledgerDark, margin: "16px 0 2px" }}>Debt Payoff Planners</h2>
        <p style={{ fontSize: 12, color: C.inkSoft, margin: "0 0 16px" }}>Total across all debts: {fmt(totalDebt)}</p>

        {(settings.debts || []).map(debt => {
          const { balance, apr, extra, minPayment, basePayment, withExtra, withoutExtra, monthsSaved } = getDebtCalc(debt);
          return (
            <Section key={debt.id} title={debt.name} subtitle="See how extra payments shorten the timeline">
              <div style={{ textAlign: "right", marginTop: -40, marginBottom: 8 }}>
                <button onClick={() => removeDebt(debt.id)} style={{ background: "none", border: "none", cursor: "pointer", opacity: 0.4, fontSize: 13 }}>✕ remove</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <Field label="Balance">
                  <input type="number" value={debt.balance} onChange={(e) => updateDebt(debt.id, "balance", e.target.value)}
                    className="font-mono" style={{ width: "100%", background: "transparent", border: "none", outline: "none", fontSize: 14, color: C.ink }} />
                </Field>
                <Field label="APR % (0 if none)">
                  <input type="number" value={debt.apr} onChange={(e) => updateDebt(debt.id, "apr", e.target.value)}
                    className="font-mono" style={{ width: "100%", background: "transparent", border: "none", outline: "none", fontSize: 14, color: C.ink }} />
                </Field>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                <Field label="Minimum payment">
                  <input type="number" value={debt.minPayment} onChange={(e) => updateDebt(debt.id, "minPayment", e.target.value)}
                    className="font-mono" style={{ width: "100%", background: "transparent", border: "none", outline: "none", fontSize: 14, color: C.ink }} />
                </Field>
                <Field label="Extra monthly payment">
                  <input type="range" min="0" max="500" step="10" value={debt.extra} onChange={(e) => updateDebt(debt.id, "extra", e.target.value)} style={{ width: "100%" }} />
                </Field>
              </div>
              <div className="font-mono" style={{ fontSize: 13, color: C.inkSoft, margin: "0 0 16px" }}>
                Paying {fmt(basePayment)}/mo total ({fmt(extra)} extra)
              </div>
              {balance > 0 && minPayment > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <ResultCard label="Payoff time" value={`${withExtra.months} mo`} sub={`vs. ${withoutExtra.months} mo at minimum`} />
                  <ResultCard label="Time saved" value={monthsSaved > 0 ? `${monthsSaved} mo faster` : "—"} sub={apr > 0 ? `Interest: ${fmt(withExtra.totalInterest)}` : "No interest applied"} />
                </div>
              ) : (
                <p style={{ fontSize: 13, color: C.inkSoft }}>Enter a minimum payment above to see a payoff timeline.</p>
              )}
            </Section>
          );
        })}

        <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 8, padding: 20, marginBottom: 24 }}>
          {!addingDebt ? (
            <button onClick={() => setAddingDebt(true)} style={{ background: "none", border: "none", color: C.ledger, fontSize: 12, cursor: "pointer" }}>+ Add another debt</button>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input value={newDebtName} onChange={(e) => setNewDebtName(e.target.value)} placeholder="Debt name"
                style={{ fontSize: 14, flex: 1, borderRadius: 4, padding: "6px 8px", border: "none", outline: "none", background: C.sand }} />
              <input value={newDebtBalance} onChange={(e) => setNewDebtBalance(e.target.value)} placeholder="Balance" type="number"
                className="font-mono" style={{ fontSize: 14, width: 100, borderRadius: 4, padding: "6px 8px", border: "none", outline: "none", background: C.sand }} />
              <button onClick={() => { addDebt(newDebtName, newDebtBalance); setNewDebtName(""); setNewDebtBalance(""); setAddingDebt(false); }}
                style={{ fontSize: 12, padding: "6px 12px", borderRadius: 4, color: "#fff", background: C.ledger, border: "none", cursor: "pointer" }}>Add</button>
            </div>
          )}
        </div>

        <p style={{ fontSize: 11, textAlign: "center", color: C.inkSoft, marginTop: 24 }}>
          Data saves automatically on this device — switch months anytime with the arrows above.
        </p>
      </div>
    </div>
  );
}

function Stat({ label, value, accent, bg }) {
  return (
    <div style={{ background: bg || C.card, border: `1px solid ${C.line}`, borderRadius: 8, padding: 16 }}>
      <p style={{ fontSize: 12, color: C.inkSoft, margin: "0 0 4px" }}>{label}</p>
      <p className="font-mono" style={{ fontSize: 18, fontWeight: 600, color: accent || C.ledgerDark, margin: 0 }}>{value}</p>
    </div>
  );
}

function Section({ title, subtitle, children }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 8, padding: 20, marginBottom: 24 }}>
      <h2 className="font-display" style={{ fontSize: 20, color: C.ledgerDark, margin: "0 0 2px" }}>{title}</h2>
      <p style={{ fontSize: 12, color: C.inkSoft, margin: "0 0 16px" }}>{subtitle}</p>
      {children}
    </div>
  );
}

function BillRow({ name, amount, paid, onToggle, onRemove, tag }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onToggle} style={{ width: 20, height: 20, borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, background: paid ? C.moss : "transparent", border: `1.5px solid ${paid ? C.moss : C.line}`, cursor: "pointer", color: "#fff", fontSize: 12 }}>
          {paid ? "✓" : ""}
        </button>
        <span style={{ fontSize: 14, color: paid ? C.inkSoft : C.ink, textDecoration: paid ? "line-through" : "none" }}>{name}</span>
        {tag && <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: C.sand, color: C.gold }}>{tag}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span className="font-mono" style={{ fontSize: 14 }}>{fmt(amount)}</span>
        {onRemove && <button onClick={onRemove} style={{ background: "none", border: "none", cursor: "pointer", opacity: 0.4, fontSize: 13 }}>✕</button>}
      </div>
    </div>
  );
}

function VarRow({ bill, actual, onChangeActual, onRemove }) {
  const val = actual !== undefined ? actual : "";
  const numActual = val !== "" ? parseFloat(val) : bill.budgeted;
  const over = numActual > bill.budgeted;
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.line}` }}>
      <div>
        <p style={{ fontSize: 14, margin: 0 }}>{bill.name}</p>
        <p className="font-mono" style={{ fontSize: 11, color: C.inkSoft, margin: 0 }}>budgeted {fmt(bill.budgeted)}</p>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <input type="number" value={val} onChange={(e) => onChangeActual(e.target.value)} placeholder={String(bill.budgeted)}
          className="font-mono" style={{ fontSize: 14, width: 80, textAlign: "right", borderRadius: 4, padding: "4px 8px", border: "none", outline: "none", background: over ? C.rustBg : C.mossBg, color: over ? C.rust : C.moss }} />
        {onRemove && <button onClick={onRemove} style={{ background: "none", border: "none", cursor: "pointer", opacity: 0.4, fontSize: 13 }}>✕</button>}
      </div>
    </div>
  );
}

function AddRow({ adding, setAdding, name, setName, amt, setAmt, onAdd, label }) {
  if (!adding) {
    return <button onClick={() => setAdding(true)} style={{ background: "none", border: "none", color: C.ledger, fontSize: 12, marginTop: 12, cursor: "pointer" }}>+ {label}</button>;
  }
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 12 }}>
      <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Name" style={{ fontSize: 14, flex: 1, borderRadius: 4, padding: "6px 8px", border: "none", outline: "none", background: C.sand }} />
      <input value={amt} onChange={(e) => setAmt(e.target.value)} placeholder="Amount" type="number" className="font-mono" style={{ fontSize: 14, width: 90, borderRadius: 4, padding: "6px 8px", border: "none", outline: "none", background: C.sand }} />
      <button onClick={onAdd} style={{ fontSize: 12, padding: "6px 12px", borderRadius: 4, color: "#fff", background: C.ledger, border: "none", cursor: "pointer" }}>Add</button>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 8 }}>
      <p style={{ fontSize: 11, color: C.inkSoft, margin: "0 0 4px" }}>{label}</p>
      <div style={{ borderRadius: 4, padding: "8px 12px", background: C.sand }}>{children}</div>
    </div>
  );
}

function ResultCard({ label, value, sub }) {
  return (
    <div style={{ background: C.mossBg, borderRadius: 8, padding: 16 }}>
      <p style={{ fontSize: 11, color: C.inkSoft, margin: "0 0 4px" }}>{label}</p>
      <p className="font-mono" style={{ fontSize: 17, fontWeight: 600, color: C.moss, margin: 0 }}>{value}</p>
      <p style={{ fontSize: 11, color: C.inkSoft, margin: "2px 0 0" }}>{sub}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HouseholdLedger />);
</script>
</body>
</html>
