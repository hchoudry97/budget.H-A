<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Our Household Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FAF8F3; --card:#FFFFFF; --ink:#262421; --inkSoft:#6B6659;
    --line:#E4DFD3; --ledger:#2F5D62; --ledgerDark:#20403F;
    --moss:#4B7A51; --mossBg:#EAF1E8; --rust:#B54B2E; --rustBg:#F7E9E4;
    --sand:#F0EBDD; --gold:#B08D3F;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:32px 20px; }
  .display { font-family:'Fraunces',serif; }
  .mono { font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums; }
  h1 { font-size:30px; color:var(--ledgerDark); margin:0 0 4px; }
  .sub { font-size:13px; color:var(--inkSoft); margin:0 0 24px; }
  .monthbar { display:flex; align-items:center; justify-content:space-between; background:var(--ledgerDark); border-radius:8px; padding:12px 16px; margin-bottom:24px; }
  .monthbar button { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:0 8px; line-height:1; }
  .monthbar span { color:#fff; font-size:14px; }
  .funds { background:var(--ledgerDark); border-radius:8px; padding:16px; margin-bottom:24px; }
  .funds .lbl { font-size:12px; color:#C9D6D5; margin:0 0 4px; }
  .funds .row { display:flex; align-items:center; gap:8px; }
  .funds .row span { font-size:18px; color:#fff; }
  .funds input { font-size:18px; background:transparent; border:none; outline:none; color:#fff; width:100%; }
  .funds .meta { font-size:12px; margin:8px 0 0; color:#C9D6D5; }
  .funds .meta.debt { color:#E8C4B8; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:32px; }
  .stat { border-radius:8px; padding:16px; background:var(--card); border:1px solid var(--line); }
  .stat .lbl { font-size:12px; color:var(--inkSoft); margin:0 0 4px; }
  .stat .val { font-size:18px; font-weight:600; color:var(--ledgerDark); margin:0; }
  .section { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:20px; margin-bottom:24px; }
  .section h2 { font-size:20px; color:var(--ledgerDark); margin:0 0 2px; }
  .section .ssub { font-size:12px; color:var(--inkSoft); margin:0 0 16px; }
  .billrow { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); }
  .billrow .left { display:flex; align-items:center; gap:12px; }
  .chk { width:20px; height:20px; border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border:1.5px solid var(--line); background:transparent; cursor:pointer; color:#fff; font-size:12px; }
  .chk.on { background:var(--moss); border-color:var(--moss); }
  .bill-name { font-size:14px; }
  .bill-name.paid { color:var(--inkSoft); text-decoration:line-through; }
  .right { display:flex; align-items:center; gap:8px; }
  .amt { font-size:14px; }
  .rm { background:none; border:none; cursor:pointer; opacity:0.4; font-size:13px; color:var(--ink); }
  .var-actual { font-size:14px; width:80px; text-align:right; border-radius:4px; padding:4px 8px; border:none; outline:none; background:var(--mossBg); color:var(--moss); }
  .var-actual.over { background:var(--rustBg); color:var(--rust); }
  .amt-input { font-size:14px; width:104px; text-align:right; border-radius:4px; padding:4px 8px; border:none; outline:none; background:var(--sand); color:var(--ink); }
  .amt-input:focus { box-shadow:0 0 0 2px var(--ledger); }
  .addbtn { background:none; border:none; color:var(--ledger); font-size:12px; margin-top:12px; cursor:pointer; }
  .addrow { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .addrow input { font-size:14px; border-radius:4px; padding:6px 8px; border:none; outline:none; background:var(--sand); }
  .addrow input.name { flex:1; min-width:0; }
  .addrow input.num { width:96px; }
  .addrow button { font-size:12px; padding:6px 12px; border-radius:4px; color:#fff; background:var(--ledger); border:none; cursor:pointer; }
  .field { margin-bottom:8px; }
  .field .flbl { font-size:11px; color:var(--inkSoft); margin:0 0 4px; }
  .field .fbox { border-radius:4px; padding:8px 12px; background:var(--sand); }
  .field .fbox input { width:100%; background:transparent; border:none; outline:none; font-size:14px; color:var(--ink); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .mb3 { margin-bottom:12px; } .mb4 { margin-bottom:16px; }
  .paytxt { font-size:13px; color:var(--inkSoft); margin:0 0 16px; }
  .result { background:var(--mossBg); border-radius:8px; padding:16px; }
  .result .lbl { font-size:11px; color:var(--inkSoft); margin:0 0 4px; }
  .result .val { font-size:17px; font-weight:600; color:var(--moss); margin:0; }
  .result .sub { font-size:11px; color:var(--inkSoft); margin:2px 0 0; }
  .debt-head { display:flex; align-items:baseline; justify-content:space-between; margin:8px 0 2px; }
  .debt-head h2 { font-size:20px; color:var(--ledgerDark); margin:0; }
  .rmdebt { text-align:right; margin-bottom:8px; }
  .rmdebt button { background:none; border:none; cursor:pointer; opacity:0.5; font-size:12px; color:var(--ink); }
  .foot { font-size:11px; text-align:center; color:var(--inkSoft); margin-top:24px; }
  input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:var(--line); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--ledger); cursor:pointer; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";

var DEFAULTS = {
  incomeA: 1840, incomeB: 1277, rent: 1750,
  fixedBills: [
    { id:"bmw", name:"BMW Car Payment", amount:1107.66 },
    { id:"geico", name:"Geico Insurance", amount:113 },
    { id:"tmobile", name:"T-Mobile", amount:141 },
    { id:"jewelry", name:"Jewelry Payment", amount:505 },
    { id:"sofa", name:"Crate & Barrel Card (Sofa)", amount:35 },
    { id:"watch", name:"Apple Watch (9/12)", amount:66.58 },
    { id:"iphone", name:"iPhone (21/24)", amount:29.12 },
    { id:"icloud", name:"iCloud Storage", amount:9.99 },
    { id:"claude", name:"Claude", amount:20 }
  ],
  variableBills: [
    { id:"utilities", name:"Electric / Water / Gas", budgeted:125 },
    { id:"groceries", name:"Groceries", budgeted:500 },
    { id:"gas", name:"Car Fuel", budgeted:150 },
    { id:"cats", name:"Cat Food / Litter / Vet", budgeted:100 }
  ],
  availableFunds: 0,
  debts: [
    { id:"jewelry", name:"Jewelry Payment", balance:12266.68, apr:0, minPayment:505, extra:0 },
    { id:"sofa", name:"Crate & Barrel Card (Sofa)", balance:3458.04, apr:0, minPayment:35, extra:0 },
    { id:"cc1", name:"Credit Card 1", balance:10209.59, apr:0, minPayment:0, extra:0 },
    { id:"cc2", name:"Credit Card 2", balance:3473.71, apr:0, minPayment:0, extra:0 }
  ]
};

function fmt(n){ n=parseFloat(n); if(isNaN(n))n=0; return n.toLocaleString("en-US",{style:"currency",currency:"USD"}); }
function mkey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function mlabel(d){ return d.toLocaleString("en-US",{month:"long",year:"numeric"}); }

function loadJSON(key, fb){
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : fb; } catch(e){ return fb; }
}
function saveJSON(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

var settings = loadJSON("ledger:settings", null);
if(!settings){ settings = JSON.parse(JSON.stringify(DEFAULTS)); }
if(settings.availableFunds === undefined) settings.availableFunds = 0;
if(!settings.debts) settings.debts = JSON.parse(JSON.stringify(DEFAULTS.debts));

var viewDate = new Date();
var monthData = { paid:{}, actuals:{} };

function loadMonth(){ monthData = loadJSON("ledger:month:"+mkey(viewDate), { paid:{}, actuals:{} }); }
function saveMonth(){ saveJSON("ledger:month:"+mkey(viewDate), monthData); }
function saveSettings(){ saveJSON("ledger:settings", settings); }

function calc(){
  var monthlyIncome = ((parseFloat(settings.incomeA)||0)+(parseFloat(settings.incomeB)||0))*26/12;
  var rent = parseFloat(settings.rent)||0;
  var fixedTotal = settings.fixedBills.reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0)+rent;
  var varActual = settings.variableBills.reduce(function(s,b){
    var a = monthData.actuals[b.id];
    return s + ((a!==undefined && a!=="") ? parseFloat(a) : (parseFloat(b.budgeted)||0));
  },0);
  var remaining = monthlyIncome - fixedTotal - varActual;
  var available = parseFloat(settings.availableFunds)||0;
  var totalDebt = settings.debts.reduce(function(s,d){return s+(parseFloat(d.balance)||0);},0);
  return { monthlyIncome:monthlyIncome, rent:rent, fixedTotal:fixedTotal, varActual:varActual,
           remaining:remaining, available:available, totalDebt:totalDebt, net:available-totalDebt };
}

function payoff(bal, monthlyRate, payment){
  if(bal<=0 || payment<=0) return { months:0, interest:0, ok:false };
  var b=bal, months=0, interest=0;
  while(b>0 && months<600){ var i=b*monthlyRate; interest+=i; b=b+i-payment; months++; }
  return { months:months, interest:interest, ok:true };
}
function debtCalc(d){
  var bal=parseFloat(d.balance)||0, apr=parseFloat(d.apr)||0, extra=parseFloat(d.extra)||0, minp=parseFloat(d.minPayment)||0;
  var base=minp+extra, rate=apr/100/12;
  var we=payoff(bal,rate,base), wo=payoff(bal,rate,minp);
  return { bal:bal, apr:apr, extra:extra, minp:minp, base:base, we:we, wo:wo, saved:wo.months-we.months };
}

function el(tag, cls, txt){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(txt!==undefined && txt!==null) e.textContent=txt;
  return e;
}

function render(){
  var c = calc();
  var app = document.getElementById("app");
  app.innerHTML = "";

  app.appendChild(el("h1","display","Our Household Budget"));
  app.appendChild(el("p","sub","Bills, budgets, and the payoff plan — updated together."));

  var mb = el("div","monthbar");
  var prev = el("button",null,"‹"); prev.onclick=function(){ viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()-1,1); loadMonth(); render(); };
  var next = el("button",null,"›"); next.onclick=function(){ viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,1); loadMonth(); render(); };
  mb.appendChild(prev); mb.appendChild(el("span","mono",mlabel(viewDate))); mb.appendChild(next);
  app.appendChild(mb);

  app.appendChild(incomeSection(c));

  var f = el("div","funds");
  f.appendChild(el("p","lbl","Available funds (joint checking account)"));
  var frow = el("div","row");
  frow.appendChild(el("span","mono","$"));
  var finput = document.createElement("input");
  finput.type="number"; finput.className="mono"; finput.value=settings.availableFunds; finput.placeholder="0.00";
  finput.oninput=function(){ settings.availableFunds=finput.value; saveSettings(); updateComputed(); };
  frow.appendChild(finput);
  f.appendChild(frow);
  var fmeta = el("p","meta"+(c.totalDebt>0?" debt":""), "Total debt owed: "+fmt(c.totalDebt)+" · Net position: "+fmt(c.net));
  fmeta.id="fundsMeta";
  f.appendChild(fmeta);
  app.appendChild(f);

  var stats = el("div","stats");
  stats.appendChild(statCard("Monthly income", fmt(c.monthlyIncome), "statIncome"));
  stats.appendChild(statCard("Fixed bills (incl. rent)", fmt(c.fixedTotal), "statFixed"));
  stats.appendChild(statCard("Variable (actual)", fmt(c.varActual), "statVar"));
  var leftover = statCard("Left over", fmt(c.remaining), "statLeft");
  leftover.style.background = c.remaining<0 ? "var(--rustBg)" : "var(--mossBg)";
  leftover.querySelector(".val").style.color = c.remaining<0 ? "var(--rust)" : "var(--moss)";
  stats.appendChild(leftover);
  app.appendChild(stats);

  var paidCount = settings.fixedBills.filter(function(b){return monthData.paid[b.id];}).length;
  var fs = section("Fixed Bills", paidCount+" of "+(settings.fixedBills.length+1)+" paid this month");
  fs.appendChild(billRow("rent","Rent + Utilities", c.rent, true));
  settings.fixedBills.forEach(function(b){ fs.appendChild(billRow(b.id, b.name, b.amount, false, b)); });
  fs.appendChild(addRow("fixed"));
  app.appendChild(fs);

  var vs = section("Variable Bills", "Budgeted estimate vs. this month's actual");
  settings.variableBills.forEach(function(b){ vs.appendChild(varRow(b)); });
  vs.appendChild(addRow("var"));
  app.appendChild(vs);

  var dh = el("div","debt-head");
  dh.appendChild(el("h2","display","Debt Payoff Planners"));
  app.appendChild(dh);
  app.appendChild(el("p","sub","Total across all debts: "+fmt(c.totalDebt)));
  settings.debts.forEach(function(d){ app.appendChild(debtSection(d)); });

  var addWrap = el("div","section");
  addWrap.appendChild(addRow("debt"));
  app.appendChild(addWrap);

  app.appendChild(el("p","foot","Data saves automatically on this device — switch months with the arrows above."));
}

function statCard(lbl, val, id){
  var s = el("div","stat");
  s.appendChild(el("p","lbl",lbl));
  var v = el("p","val mono",val); v.id=id;
  s.appendChild(v);
  return s;
}

function incomeSection(c){
  var s = section("Household Income", "Biweekly paychecks — monthly total calculated automatically");
  var g = el("div","grid2 mb3");
  g.appendChild(fieldNum("Paycheck 1 (biweekly)", settings.incomeA, function(v){ settings.incomeA=v; saveSettings(); updateComputed(); }));
  g.appendChild(fieldNum("Paycheck 2 (biweekly)", settings.incomeB, function(v){ settings.incomeB=v; saveSettings(); updateComputed(); }));
  s.appendChild(g);
  var mline = el("p","paytxt mono"); mline.id="incomeMonthly";
  mline.textContent = "Monthly household income: "+fmt(c.monthlyIncome)+"  (biweekly × 26 ÷ 12)";
  s.appendChild(mline);
  return s;
}

function section(title, sub){
  var s = el("div","section");
  s.appendChild(el("h2","display",title));
  s.appendChild(el("p","ssub",sub));
  return s;
}

function billRow(id, name, amount, isRent, billObj){
  var row = el("div","billrow");
  var left = el("div","left");
  var chk = el("div","chk"+(monthData.paid[id]?" on":""), monthData.paid[id]?"✓":"");
  chk.onclick=function(){ monthData.paid[id]=!monthData.paid[id]; saveMonth(); render(); };
  left.appendChild(chk);
  left.appendChild(el("span","bill-name"+(monthData.paid[id]?" paid":""), name));
  row.appendChild(left);
  var right = el("div","right");
  var inp = document.createElement("input");
  inp.type="number"; inp.className="amt-input mono"; inp.value=amount;
  inp.oninput=function(){
    if(isRent){ settings.rent = inp.value; }
    else if(billObj){ billObj.amount = inp.value; }
    saveSettings(); updateComputed();
  };
  right.appendChild(inp);
  if(!isRent && billObj){
    var rm = el("button","rm","✕");
    rm.onclick=function(){ settings.fixedBills=settings.fixedBills.filter(function(x){return x.id!==id;}); saveSettings(); render(); };
    right.appendChild(rm);
  }
  row.appendChild(right);
  return row;
}

function varRow(b){
  var row = el("div","billrow");
  var left = el("div");
  left.appendChild(el("p","bill-name",b.name));
  var bud = el("p","mono"); bud.style.fontSize="11px"; bud.style.color="var(--inkSoft)"; bud.style.margin="0";
  bud.textContent="budgeted "+fmt(b.budgeted);
  left.appendChild(bud);
  row.appendChild(left);
  var right = el("div","right");
  var val = monthData.actuals[b.id]!==undefined ? monthData.actuals[b.id] : "";
  var na = val!=="" ? parseFloat(val) : b.budgeted;
  var inp = document.createElement("input");
  inp.type="number"; inp.className="var-actual mono"+((na>b.budgeted)?" over":""); inp.value=val; inp.placeholder=String(b.budgeted);
  inp.oninput=function(){
    monthData.actuals[b.id]=inp.value; saveMonth();
    var nv = inp.value!=="" ? parseFloat(inp.value) : b.budgeted;
    inp.className="var-actual mono"+((nv>b.budgeted)?" over":"");
    updateComputed();
  };
  right.appendChild(inp);
  var rm = el("button","rm","✕");
  rm.onclick=function(){ settings.variableBills=settings.variableBills.filter(function(x){return x.id!==b.id;}); saveSettings(); render(); };
  right.appendChild(rm);
  row.appendChild(right);
  return row;
}

function debtSection(d){
  var dc = debtCalc(d);
  var s = el("div","section");
  s.appendChild(el("h2","display",d.name));
  s.appendChild(el("p","ssub","See how extra payments shorten the timeline"));
  var rmw = el("div","rmdebt");
  var rm = el("button",null,"✕ remove");
  rm.onclick=function(){ settings.debts=settings.debts.filter(function(x){return x.id!==d.id;}); saveSettings(); render(); };
  rmw.appendChild(rm);
  s.appendChild(rmw);

  var g1 = el("div","grid2 mb3");
  g1.appendChild(fieldNum("Balance", d.balance, function(v){ d.balance=v; saveSettings(); updateDebtResult(d, s); updateComputed(); }));
  g1.appendChild(fieldNum("APR % (0 if none)", d.apr, function(v){ d.apr=v; saveSettings(); updateDebtResult(d, s); }));
  s.appendChild(g1);

  var g2 = el("div","grid2 mb4");
  g2.appendChild(fieldNum("Minimum payment", d.minPayment, function(v){ d.minPayment=v; saveSettings(); updateDebtResult(d, s); }));
  var extraField = el("div","field");
  extraField.appendChild(el("p","flbl","Extra monthly payment"));
  var range = document.createElement("input");
  range.type="range"; range.min="0"; range.max="500"; range.step="10"; range.value=d.extra;
  range.oninput=function(){ d.extra=range.value; saveSettings(); updateDebtResult(d, s); };
  extraField.appendChild(range);
  g2.appendChild(extraField);
  s.appendChild(g2);

  var paytxt = el("p","paytxt mono"); paytxt.setAttribute("data-role","paytxt");
  paytxt.textContent = "Paying "+fmt(dc.base)+"/mo total ("+fmt(dc.extra)+" extra)";
  s.appendChild(paytxt);

  var resultWrap = el("div"); resultWrap.setAttribute("data-role","result");
  s.appendChild(resultWrap);
  fillDebtResult(d, resultWrap);

  return s;
}

function fillDebtResult(d, wrap){
  var dc = debtCalc(d);
  wrap.innerHTML="";
  if(dc.bal>0 && dc.minp>0){
    var g = el("div","grid2");
    var r1 = el("div","result");
    r1.appendChild(el("p","lbl","Payoff time"));
    r1.appendChild(el("p","val mono", dc.we.months+" mo"));
    r1.appendChild(el("p","sub","vs. "+dc.wo.months+" mo at minimum"));
    g.appendChild(r1);
    var r2 = el("div","result");
    r2.appendChild(el("p","lbl","Time saved"));
    r2.appendChild(el("p","val mono", dc.saved>0 ? dc.saved+" mo faster" : "—"));
    r2.appendChild(el("p","sub", dc.apr>0 ? "Interest: "+fmt(dc.we.interest) : "No interest applied"));
    g.appendChild(r2);
    wrap.appendChild(g);
  } else {
    wrap.appendChild(el("p","ssub","Enter a minimum payment above to see a payoff timeline."));
  }
}

function updateDebtResult(d, sectionEl){
  var dc = debtCalc(d);
  var paytxt = sectionEl.querySelector('[data-role="paytxt"]');
  if(paytxt) paytxt.textContent = "Paying "+fmt(dc.base)+"/mo total ("+fmt(dc.extra)+" extra)";
  var wrap = sectionEl.querySelector('[data-role="result"]');
  if(wrap) fillDebtResult(d, wrap);
}

function fieldNum(lbl, value, onchange){
  var f = el("div","field");
  f.appendChild(el("p","flbl",lbl));
  var box = el("div","fbox");
  var inp = document.createElement("input");
  inp.type="number"; inp.className="mono"; inp.value=value;
  inp.oninput=function(){ onchange(inp.value); };
  box.appendChild(inp);
  f.appendChild(box);
  return f;
}

var adding = { fixed:false, "var":false, debt:false };
function addRow(kind){
  if(!adding[kind]){
    var label = kind==="fixed" ? "Add fixed bill" : kind==="var" ? "Add variable bill" : "Add another debt";
    var btn = el("button","addbtn","+ "+label);
    btn.onclick=function(){ adding[kind]=true; render(); };
    return btn;
  }
  var row = el("div","addrow");
  var name = document.createElement("input"); name.className="name"; name.placeholder = kind==="debt"?"Debt name":"Name";
  var num = document.createElement("input"); num.className="num mono"; num.type="number"; num.placeholder = kind==="debt"?"Balance":"Amount";
  var add = el("button",null,"Add");
  add.onclick=function(){
    var nm=name.value.trim(), amt=parseFloat(num.value);
    if(nm && !isNaN(amt)){
      var id = kind.substr(0,2)+"_"+Date.now();
      if(kind==="fixed") settings.fixedBills.push({ id:id, name:nm, amount:amt });
      else if(kind==="var") settings.variableBills.push({ id:id, name:nm, budgeted:amt });
      else settings.debts.push({ id:id, name:nm, balance:amt, apr:0, minPayment:0, extra:0 });
      saveSettings();
    }
    adding[kind]=false; render();
  };
  row.appendChild(name); row.appendChild(num); row.appendChild(add);
  return row;
}

function updateComputed(){
  var c = calc();
  var set = function(id,val){ var e=document.getElementById(id); if(e) e.textContent=val; };
  set("statIncome", fmt(c.monthlyIncome));
  set("statFixed", fmt(c.fixedTotal));
  set("statVar", fmt(c.varActual));
  set("incomeMonthly", "Monthly household income: "+fmt(c.monthlyIncome)+"  (biweekly × 26 ÷ 12)");
  var left = document.getElementById("statLeft");
  if(left){ left.textContent=fmt(c.remaining);
    var card=left.closest(".stat");
    if(card){ card.style.background = c.remaining<0?"var(--rustBg)":"var(--mossBg)"; left.style.color = c.remaining<0?"var(--rust)":"var(--moss)"; } }
  var fm = document.getElementById("fundsMeta");
  if(fm){ fm.textContent="Total debt owed: "+fmt(c.totalDebt)+" · Net position: "+fmt(c.net);
    fm.className = "meta"+(c.totalDebt>0?" debt":""); }
}

loadMonth();
render();
</script>
</body>
